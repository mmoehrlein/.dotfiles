"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$package\
$nodejs\
$bun\
$fill\
$cmd_duration\
$jobs\
$line_break\
$character\
"""

palette = 'oxide'

# Define custom colors
[palettes.oxide]
# Overwrite existing color
black = "#212121" # Base 00 - black
red = "#E57373" # Base 08 - red
green = "#A6BC69" # Base 0B - green
yellow = "#FAC863" # Base 0A - yellow
blue = "#6699CC" # Base 0D - blue
magenta = "#C594C5" # Base 0E - magenta
cyan = "#5FB3B3" # Base 0C - cyan
white = "#C0C5CE" # Base 05 - white

bright-black = "#65737E" # Base 03 - Bright black
bright-red = "#f2b9b9" # Base 08 - Bright red
bright-green = "#d2ddb4" # Base 0B - Bright green
bright-yellow = "#fce3b1" # Base 0A - Bright yellow
bright-blue = "#b3cce6" # Base 0D - Bright blue
bright-magenta = "#e2c9e2" # Base 0E - Bright magenta
bright-cyan = "#afd9d9" # Base 0C - Bright cyan
bright-white = "#F3F4F5" # Base 07 - Bright white


turquoise="73"
orange="179"
purple="140"
pink ="167"
limegreen="107"


